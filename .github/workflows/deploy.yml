name: Deploy

on:
  push:
    tags:
      - '*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract tag version
        id: version
        run: |
          RAW="${GITHUB_REF#refs/tags/}"
          CLEAN="${RAW#v}"
          echo "RAW=$RAW" >> $GITHUB_OUTPUT
          echo "VERSION=$CLEAN" >> $GITHUB_OUTPUT
          if [[ "$CLEAN" =~ -[A-Za-z0-9]+ ]]; then
            echo "NPM_TAG=next" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "NPM_TAG=latest" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Commit version update
        uses: test-room-7/action-update-file@v1
        with:
          file-path: |
            package.json
            package-lock.json
          commit-msg: "chore: update package.json version to ${{ steps.version.outputs.VERSION }}"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --tag ${{ steps.version.outputs.NPM_TAG }}
